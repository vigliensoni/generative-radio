<!DOCTYPE html>
<html>

<head>
  <title>Generative Radio</title>
  <script type="module" src="dist/index.js" charset="utf-8"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>

<body>
  <div class="overlay" id="overlay">
    <div class="title">SOUNDS</div>
    <div class="subtitle">from a distant world </div>
    <button class="start" id="startBtn">LISTEN</button>
  </div>

  <div class="player" id="player">
    <div class="top-bar">
      <div class="now-location" id="nowLocation"></div>
      <button class="fullscreen-btn" id="fullscreenBtn" title="Fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 14v4a2 2 0 002 2h4M20 14v4a2 2 0 01-2 2h-4M4 10V6a2 2 0 012-2h4M20 10V6a2 2 0 00-2-2h-4"/>
        </svg>
      </button>
    </div>
    <div class="log-container" id="logContainer"></div>
    <div class="controls">
      <button class="stop" id="stopBtn">■</button>
      <div class="volume-control">
        <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/>
          <path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/>
        </svg>
        <input type="range" min="0" max="1" step="0.01" value="1" id="volume">
      </div>
    </div>
  </div>
</body>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    background: #000;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    height: 100%;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* --- START OVERLAY --- */

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #000;
    z-index: 10;
    padding: 2rem;
    transition: opacity 2s ease, visibility 2s ease;
  }

  .overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .title {
    font-size: clamp(1.8rem, 8vw, 7rem);
    font-weight: 200;
    letter-spacing: 0.4em;
    color: #fff;
    margin-bottom: 0.3em;
    text-align: center;
  }

  .subtitle {
    font-size: clamp(0.8rem, 2.5vw, 1.8rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    color: #555;
    text-transform: lowercase;
    margin-bottom: 4em;
    text-align: center;
  }

  .start {
    background: none;
    border: 1px solid #333;
    color: #999;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 2vw, 1.5rem);
    letter-spacing: 0.5em;
    padding: 1.2em 3.5em;
    cursor: pointer;
    transition: all 0.8s ease;
  }

  .start:hover {
    border-color: #999;
    color: #fff;
    background: rgba(255, 255, 255, 0.04);
  }

  /* --- PLAYER VIEW --- */

  .player {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transition: opacity 3s ease;
  }

  .player.visible {
    opacity: 1;
  }

  /* --- TOP BAR --- */

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 3vh 5vw;
    flex-shrink: 0;
  }

  .now-location {
    font-size: clamp(0.7rem, 2vw, 1.4rem);
    font-weight: 200;
    letter-spacing: 0.5em;
    color: #222;
    text-transform: uppercase;
    transition: color 2s ease;
    flex: 1;
  }

  .now-location.active {
    color: #4a4a4a;
  }

  .fullscreen-btn {
    background: none;
    border: 1px solid #1a1a1a;
    color: #444;
    width: 2.8em;
    height: 2.8em;
    padding: 0.55em;
    cursor: pointer;
    transition: all 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .fullscreen-btn svg {
    width: 100%;
    height: 100%;
  }

  .fullscreen-btn:hover {
    border-color: #444;
    color: #aaa;
  }

  .fullscreen-btn.is-fullscreen svg {
    transform: rotate(180deg);
  }

  /* --- LOG --- */

  .log-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 5vw;
    overflow: hidden;
    mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.3) 12%, black 35%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.3) 12%, black 35%);
  }

  .log-line {
    opacity: 0;
    transform: translateY(2em);
    animation: fadeUp 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    margin-bottom: 2vh;
    line-height: 1.5;
    padding-bottom: 2vh;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
  }

  .log-line:last-child {
    border-bottom: none;
  }

  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .log-line .sound-name {
    display: block;
    font-size: clamp(1.3rem, 4vw, 3.2rem);
    font-weight: 300;
    color: #fff;
    margin-bottom: 0.3em;
    line-height: 1.2;
    word-break: break-word;
  }

  .log-line .sound-meta {
    display: block;
    font-size: clamp(0.6rem, 1.5vw, 1.1rem);
    font-weight: 300;
    color: #666;
    letter-spacing: 0.05em;
    line-height: 1.8;
  }

  .log-line .location-tag {
    color: #999;
    font-weight: 400;
  }

  .log-line .coords-tag {
    color: #555;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
  }

  .log-line .search-tag {
    color: #444;
    font-style: italic;
  }

  .log-line .duration-tag {
    color: #555;
  }

  .log-line.fading {
    transition: opacity 4s ease;
    opacity: 0.2 !important;
  }

  /* --- CONTROLS --- */

  .controls {
    display: flex;
    align-items: center;
    padding: 3vh 5vw;
    gap: 1.5em;
    flex-shrink: 0;
  }

  .stop {
    background: none;
    border: 1px solid #1a1a1a;
    color: #444;
    font-size: 1rem;
    width: 2.8em;
    height: 2.8em;
    cursor: pointer;
    transition: all 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .stop:hover {
    border-color: #444;
    color: #aaa;
  }

  .volume-control {
    display: flex;
    align-items: center;
    gap: 0.8em;
    flex: 1;
    max-width: 280px;
  }

  .volume-icon {
    width: 1.2em;
    height: 1.2em;
    color: #444;
    flex-shrink: 0;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 1px;
    background: #1a1a1a;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #444;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    background: #888;
  }

  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #444;
    cursor: pointer;
    border: none;
  }

  /* --- MOBILE --- */

  @media (max-width: 600px) {
    .title {
      letter-spacing: 0.2em;
    }

    .subtitle {
      letter-spacing: 0.15em;
      margin-bottom: 3em;
    }

    .start {
      letter-spacing: 0.3em;
      padding: 1em 2.5em;
    }

    .top-bar {
      padding: 2vh 4vw;
    }

    .log-container {
      padding: 0 4vw;
    }

    .log-line {
      margin-bottom: 1.5vh;
      padding-bottom: 1.5vh;
    }

    .log-line .sound-name {
      font-size: clamp(1.1rem, 5vw, 1.6rem);
    }

    .log-line .sound-meta {
      font-size: clamp(0.55rem, 2.5vw, 0.75rem);
    }

    .now-location {
      font-size: clamp(0.55rem, 2.5vw, 0.8rem);
      letter-spacing: 0.3em;
    }

    .controls {
      padding: 2.5vh 4vw;
      gap: 1em;
    }

    .volume-control {
      max-width: 180px;
    }

    .fullscreen-btn,
    .stop {
      width: 2.4em;
      height: 2.4em;
    }
  }

  /* --- TABLET --- */

  @media (min-width: 601px) and (max-width: 1024px) {
    .log-line .sound-name {
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
    }

    .log-line .sound-meta {
      font-size: clamp(0.65rem, 1.4vw, 0.9rem);
    }
  }

  /* --- LARGE SCREEN --- */

  @media (min-width: 1400px) {
    .log-container {
      padding: 0 8vw;
    }

    .top-bar {
      padding: 3vh 8vw;
    }

    .controls {
      padding: 3vh 8vw;
    }

    .log-line .sound-name {
      font-size: 3.5rem;
    }
  }
</style>

</html>
